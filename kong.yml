_format_version: "3.0"
_transform: true

# KONG-10: Firebase JWT validation
# Algorithm: RS256
# key_claim_name: iss — Kong looks up consumer by matching jwt_secrets.key against the token's iss claim
# Firebase iss format: https://securetoken.google.com/{PROJECT_ID}
# Public key source: https://www.googleapis.com/robot/v1/metadata/x509/securetoken@system.gserviceaccount.com
# KEY ROTATION NOTE: Firebase rotates RS256 keys every ~7 days.
# If Kong starts returning 401 with "Invalid signature", re-fetch the key from the x509 endpoint above,
# match the kid in your token's header, and update rsa_public_key in this file.
# For production, use the kong-oidc plugin instead (supports JWKS auto-fetch).
# Key embedded: kid=732ca96713b1dd172385084ce9f4381ad00cece4 (expires 2026-03-30)


services:

  # 1. book-car composite
  - name: book-car-service
    url: http://composite_book_car:6001
    routes:
      - name: book-car-route
        paths:
          - /api/book-car
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        plugins:
          - name: cors
            config:
              origins:
                - "http://localhost:8080"
              methods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS
              headers:
                - Authorization
                - Content-Type
                - X-Requested-With
              exposed_headers:
                - X-Auth-Token
              credentials: true
              max_age: 3600
          - name: rate-limiting
            config:
              minute: 60
              policy: local
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp


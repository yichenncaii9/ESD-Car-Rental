apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.0-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /usr/local/kong/declarative/kong.yml
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000"
            - name: KONG_LOG_LEVEL
              value: info
          ports:
            - name: proxy
              containerPort: 8000
            - name: admin
              containerPort: 8001
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: kong-config
              mountPath: /usr/local/kong/declarative
              readOnly: true
      volumes:
        - name: kong-config
          configMap:
            name: kong-config

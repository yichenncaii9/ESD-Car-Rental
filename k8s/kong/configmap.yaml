apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: default
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    # KONG-10: Firebase JWT validation
    # Algorithm: RS256
    # key_claim_name: iss — Kong looks up consumer by matching jwt_secrets.key against the token's iss claim
    # Firebase iss format: https://securetoken.google.com/{PROJECT_ID}
    # Public key source: https://www.googleapis.com/robot/v1/metadata/x509/securetoken@system.gserviceaccount.com
    # KEY ROTATION NOTE: Firebase rotates RS256 keys every ~7 days.
    # If Kong starts returning 401 with "Invalid signature", re-fetch the key from the x509 endpoint above,
    # match the kid in your token's header, and update rsa_public_key in this file.
    # For production, use the kong-oidc plugin instead (supports JWKS auto-fetch).
    # Key embedded: kid=732ca96713b1dd172385084ce9f4381ad00cece4 (expires 2026-03-30)

    consumers:
      - username: firebase-frontend
        jwt_secrets:
          - algorithm: RS256
            key: "https://securetoken.google.com/esd-rental-car"
            rsa_public_key: |
              -----BEGIN PUBLIC KEY-----
              MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA7NWdih2XjxPTW/h1rHtS
              pKdNFXzeeGn9PvcJZTr3oXI6RAJk8TLT1I+S/nhHzKEBwIak5ry9Bp5MR8XrJgO8
              1ZG92hWOBdsuZZLOUBAHOc5Pqf6wTIWDU6vX0nqs5XyuXWJFVqlErf5oPTOkiwHS
              /JoazpiokjKodGT3zGgQTWBbqrVAaRXHSg5/6/+LJ2vz6a8uZYmYnXnvUVJAC4Zf
              omHd9wHJ7Z7WscnsEBdzfxeGmyRiZ2d5LLGl3/z8cr/m8glnzjDAG7maNB7v9A42
              OjjOliQp75RjDx1s5HO90blTa6/27pWdNphYSInRa9wvrtUZy3D0FxHQ4S8SMS44
              dQIDAQAB
              -----END PUBLIC KEY-----
            secret: "not-used-for-rs256"

    services:

      # 1. book-car composite
      - name: book-car-service
        url: http://composite-book-car:6001
        routes:
          - name: book-car-route
            paths:
              - /api/book-car
            strip_path: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            plugins:
              - name: cors
                config:
                  origins:
                    - "http://localhost:8080"
                  methods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                    - X-Requested-With
                  exposed_headers:
                    - X-Auth-Token
                  credentials: true
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local
              - name: jwt
                config:
                  key_claim_name: iss
                  claims_to_verify:
                    - exp

      # 2. cancel-booking composite
      - name: cancel-booking-service
        url: http://composite-cancel-booking:6002
        routes:
          - name: cancel-booking-route
            paths:
              - /api/cancel-booking
            strip_path: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            plugins:
              - name: cors
                config:
                  origins:
                    - "http://localhost:8080"
                  methods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                    - X-Requested-With
                  exposed_headers:
                    - X-Auth-Token
                  credentials: true
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local
              - name: jwt
                config:
                  key_claim_name: iss
                  claims_to_verify:
                    - exp

      # 3. report-issue composite
      - name: report-issue-service
        url: http://composite-report-issue:6003
        routes:

_format_version: "3.0"
_transform: true

# KONG-10 (JWT plugin) is deferred to Phase 2.
# All routes are open in Phase 1. Firebase JWT validation is added in Phase 2.

services:

  # 1. book-car composite
  - name: book-car-service
    url: http://composite_book_car:6001
    routes:
      - name: book-car-route
        paths:
          - /api/book-car
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        plugins:
          - name: cors
            config:
              origins:
                - "http://localhost:8080"
              methods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS
              headers:
                - Authorization
                - Content-Type
                - X-Requested-With
              exposed_headers:
                - X-Auth-Token
              credentials: true
              max_age: 3600
          - name: rate-limiting
            config:
              minute: 60
              policy: local

